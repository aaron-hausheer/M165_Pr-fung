services:
  mongodb:
    image: mongo:7
    container_name: m165-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: m165
      MONGO_INITDB_ROOT_PASSWORD: m165pass
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:

